name: CI — Workout Service

on:
  push:
    branches: 
      - develop
      - main
    # paths:
      # - "services/workout-service/**"
      # - ".github/workflows/ci-workout-service.yml"
      # - ".github/workflows/_ci-template.yml"
  pull_request:
    branches:
      - develop
      - main
    # paths:
    #   - "services/workout-service/**"
    #   - ".github/workflows/ci-workout-service.yml"
    #   - ".github/workflows/_ci-template.yml"

# give the workflow permission to write to the repository contents
permissions:
  contents: write


jobs:
  ci:
    uses: fitforge101/fitforge-shared/.github/workflows/_ci-template.yml@main
    with:
      service-name: workout-service
      service-path: services/workout-service
      runtime: node
      node-version: "20"
      environment: ${{ github.ref_name }}
    secrets: inherit
